<html lang="en">
<head>
    <meta charset="UTF-8">

    <style>
        :root {
            --primary: #4cc9f0;
            --secondary: #4361ee;
            --bg-dark: #050a18;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 20% 35%, rgba(67, 97, 238, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 10%, rgba(76, 201, 240, 0.1) 0%, transparent 30%);
            color: #e0e0e0;
            line-height: 1.6;
            scroll-behavior: smooth;
        }

        /* NAVIGATION */
        .nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 20px 0;
            background: rgba(5, 10, 24, 0.8);
            backdrop-filter: blur(12px);
            z-index: 1000;
            border-bottom: 1px solid var(--glass-border);
        }

        .nav-container {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }

        .logo-text {
            font-weight: 700;
            font-size: 1.2rem;
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav a.nav-link {
            margin-left: 25px;
            color: #ccc;
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .nav a.nav-link:hover { color: var(--primary); }
