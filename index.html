<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>thino.dev</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0a0f1f, #111c3d);
    color: white;
    overflow-x: hidden;
}

/* HERO */
.hero {
    text-align: center;
    padding: 100px 20px;
    animation: fadeIn 1.5s ease-in;
}

.hero h1 {
    font-size: 48px;
    color: #4cc9f0;
}

.hero p {
    color: #a0aec0;
    margin-top: 10px;
}

/* BUTTONS */
.buttons {
    margin-top: 30px;
}

.btn {
    background: #4cc9f0;
    color: black;
    padding: 12px 24px;
    margin: 10px;
    border-radius: 10px;
    text-decoration: none;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.1);
    background: #38bdf8;
}

/* SKILLS */
.skills {
    padding: 80px 20px;
    text-align: center;
}

.skill-box {
    display: inline-block;
    padding: 15px 25px;
    margin: 10px;
    border-radius: 12px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    transition: 0.3s;
}

.skill-box:hover {
    transform: translateY(-5px);
    background: rgba(255,255,255,0.1);
}

/* ANIMATION */
@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="hero">
    <h1>🚀 thino.dev</h1>
    <p>Cloud & AI Engineer Journey</p>
    <p>Building real-world cloud solutions with Azure, AI & DevOps</p>

    <div class="buttons">
        <a class="btn" href="https://github.com/thino-cloud">GitHub</a>
        <a class="btn" href="#">Projects</a>
    </div>
</div>

<div class="skills">
    <h2>🚀 Skills</h2>

    <div class="skill-box">Azure</div>
    <div class="skill-box">Cloud Computing</div>
    <div class="skill-box">AI</div>
    <div class="skill-box">DevOps</div>
    <div class="skill-box">GitHub Actions</div>
</div>

</body>
</html>
