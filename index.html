<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>thino.dev</title>
 
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
    }

    .container {
      text-align: center;
      padding: 100px 20px;
    }

    h1 {
      font-size: 3rem;
      color: #38bdf8;
      margin-bottom: 10px;
    }

    h2 {
      font-weight: 400;
      color: #cbd5e1;
    }

    .tagline {
      margin-top: 20px;
      font-size: 1.2rem;
      color: #94a3b8;
    }

    .buttons {
      margin-top: 40px;
    }

    .btn {
      text-decoration: none;
      padding: 12px 24px;
      margin: 10px;
      border-radius: 8px;
      background: #38bdf8;
      color: #0f172a;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn:hover {
      background: #0ea5e9;
    }

    .section {
      padding: 60px 20px;
      background: #020617;
    }

    .skills {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 20px;
      margin-top: 30px;
    }

    .skill {
      background: #1e293b;
      padding: 15px 25px;
      border-radius: 8px;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>🚀 thino.dev</h1>
    <h2>Cloud & AI Engineer Journey</h2>

    <p class="tagline">
      Building real-world cloud solutions with Azure, AI & DevOps
    </p>

    <div class="buttons">
      <a href="https://github.com" class="btn">GitHub</a>
      <a href="#" class="btn">Projects</a>
    </div>
  </div>

  <div class="section">
    <h2 style="text-align:center;">🚀 Skills</h2>

    <div class="skills">
      <div class="skill">Azure</div>
      <div class="skill">Cloud Computing</div>
      <div class="skill">AI</div>
      <div class="skill">DevOps</div>
      <div class="skill">GitHub Actions</div>
    </div>
  </div>

</body>
</html>
